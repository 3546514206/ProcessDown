<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessDown - AI 流程图生成器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <h1>ProcessDown</h1>
                <span class="subtitle">AI 驱动的流程图生成器</span>
                <span class="support-info">支持流程图、时序图、状态图、类图、ER 图、甘特图、饼图等 · <a href="https://mermaid.ai/open-source/intro/" target="_blank" rel="noopener">mermaid 官方文档</a></span>
            </div>
            <div class="header-actions">
                <button id="btn-fullscreen" class="icon-btn" title="全屏 (F11)">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Left Panel: Input -->
            <div class="panel panel-left" id="panel-left">
                <div class="panel-header">
                    <h2>输入</h2>
                </div>
                <div class="panel-content">
                    <textarea id="input-prompt" class="input-area" placeholder="描述你想要生成的流程图...

例如：
- 用户注册流程，包含验证邮箱、设置密码、发送欢迎邮件
- 订单处理流程，从下单、支付、发货到完成
- 请假申请流程：员工提交 → 主管审批 → HR审核 → 最终结果"></textarea>
                    <div class="input-actions">
                        <button id="btn-generate" class="btn btn-primary">
                            <span class="btn-text">生成流程图</span>
                            <span class="btn-loading" style="display:none">生成中...</span>
                        </button>
                        <button id="btn-clear" class="btn btn-secondary">清空</button>
                    </div>
                </div>

                <!-- Code Editor Section -->
                <div class="code-section">
                    <div class="code-header">
                        <h3>Mermaid 代码</h3>
                        <div class="code-actions">
                            <button id="btn-copy" class="btn btn-small" title="复制代码">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                                </svg>
                                复制
                            </button>
                        </div>
                    </div>
                    <textarea id="code-editor" class="code-editor" placeholder="Mermaid 代码将显示在这里..." spellcheck="false"></textarea>
                    <div class="code-footer">
                        <span id="code-status" class="status-text">就绪</span>
                    </div>
                </div>
            </div>

            <!-- Resizer -->
            <div class="panel-resizer" id="resizer-horizontal"></div>

            <!-- Right Panel: Preview -->
            <div class="panel panel-right" id="panel-right">
                <div class="panel-header">
                    <h2>预览</h2>
                    <div class="preview-controls">
                        <div class="zoom-controls">
                            <button id="btn-zoom-out" class="icon-btn" title="缩小 (Ctrl+-)">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M19 13H5v-2h14v2z"/>
                                </svg>
                            </button>
                            <span id="zoom-level" class="zoom-level">100%</span>
                            <button id="btn-zoom-in" class="icon-btn" title="放大 (Ctrl++)">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                                </svg>
                            </button>
                            <button id="btn-zoom-fit" class="icon-btn" title="适应窗口">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3h-6zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3v6zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6h6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6v-6z"/>
                                </svg>
                            </button>
                            <button id="btn-zoom-reset" class="icon-btn" title="重置 (Ctrl+0)">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="divider"></div>
                        <div class="bg-controls">
                            <button id="btn-bg-dark" class="icon-btn" title="深色背景">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                                </svg>
                            </button>
                            <button id="btn-bg-light" class="icon-btn" title="白色背景">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/>
                                </svg>
                            </button>
                            <button id="btn-bg-transparent" class="icon-btn" title="透明背景">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                                    <path d="M7 7h10v2H7zm0 4h10v2H7zm0 4h7v2H7z" opacity=".5"/>
                                </svg>
                            </button>
                        </div>
                        <div class="divider"></div>
                        <div class="export-controls">
                            <button id="btn-export-png" class="btn btn-small" title="导出 PNG">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                                </svg>
                                PNG
                            </button>
                            <button id="btn-export-svg" class="btn btn-small" title="导出 SVG">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                                </svg>
                                SVG
                            </button>
                        </div>
                    </div>
                </div>
                <div class="preview-area" id="preview-area">
                    <div class="preview-content" id="preview-content">
                        <div id="mermaid-container" class="mermaid-container">
                            <pre id="mermaid-code" class="mermaid-code"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Status Bar -->
        <footer class="app-status">
            <span id="status-text" class="status-ready">就绪</span>
            <span id="api-config" class="api-config"></span>
        </footer>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
    <script>
        if (typeof mermaid === 'undefined') {
            var s = document.createElement('script');
            s.src = '/vendor/mermaid.min.js';
            document.head.appendChild(s);
        }
    </script>
    <script src="/js/app.js"></script>
    <script src="/js/mermaid-render.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/export.js"></script>
</body>
</html>
